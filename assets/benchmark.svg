<svg xmlns="http://www.w3.org/2000/svg" width="760" height="206" viewBox="0 0 760 206" role="img">
  <style>
    .t1 { font: 700 16px ui-sans-serif,system-ui,sans-serif; fill: #0b0b0b; }
    .t2 { font: 12px ui-sans-serif,system-ui,sans-serif; fill: #52514e; }
    .lbl { font: 13px ui-sans-serif,system-ui,sans-serif; fill: #0b0b0b; }
    .val { font: 700 13px ui-sans-serif,system-ui,sans-serif; fill: #0b0b0b; }
    .onbar { font: 700 12px ui-sans-serif,system-ui,sans-serif; fill: #ffffff; }
    .s1 { fill: #2a78d6; } .s2 { fill: #1baf7a; }
    .grid { stroke: #52514e; stroke-opacity: .35; stroke-dasharray: 3 3; }
    .bg { fill: #fcfcfb; }
    @media (prefers-color-scheme: dark) {
      .t1, .lbl, .val { fill: #ffffff; }
      .t2 { fill: #c3c2b7; }
      .s1 { fill: #3987e5; } .s2 { fill: #199e70; }
      .grid { stroke: #c3c2b7; }
      .bg { fill: #1a1a19; }
    }
  </style>
  <rect class="bg" width="760" height="206" rx="8"/>
  <text class="t1" x="16" y="28">Same graded outcomes. A quarter of the cost.</text>
  <text class="t2" x="16" y="47">Full suite · 6 graded tasks · real CLI-reported cost</text>
  <rect class="s1" x="430" y="20" width="10" height="10" rx="2"/><text class="t2" x="445" y="29">baseline / unassisted</text><rect class="s2" x="595" y="20" width="10" height="10" rx="2"/><text class="t2" x="610" y="29">+ fable-mode</text>
  <text class="lbl" x="16" y="68">Claude Fable 5 (the target)</text>
  <rect class="s1" x="16" y="74" width="560" height="20" rx="4"/>
  <text class="onbar" x="24" y="88">6/6 outcomes</text>
  <text class="val" x="586" y="89">$10.71</text>
  <text class="lbl" x="16" y="126">Sonnet + fable-mode</text>
  <rect class="s2" x="16" y="132" width="151" height="20" rx="4"/>
  <text class="onbar" x="24" y="146">6/6 outcomes</text>
  <text class="val" x="177" y="147">$2.88</text>
  <text class="t2" x="16" y="192">reproduce: evals/run.py --conditions control --model claude-fable-5</text>
</svg>
